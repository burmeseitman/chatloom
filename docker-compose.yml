version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chatloom-backend
    ports:
      - "5001:5001"
    environment:
      - CHATLOOM_SECRET_KEY=yoursecretkeyhere
      - CHATLOOM_EXTRA_ORIGINS=https://your-frontend-on-cloudflare.pages.dev
    volumes:
      - chatloom-db:/app
    restart: always

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: chatloom-tunnel
    command: tunnel --no-autoupdate run --token ${CHATLOOM_TUNNEL_TOKEN}
    restart: always
    depends_on:
      - backend

volumes:
  chatloom-db:
