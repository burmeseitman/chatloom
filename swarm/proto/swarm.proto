syntax = "proto3";

package swarm;

service SwarmService {
  rpc Collaborate (TaskRequest) returns (TaskResponse);
  rpc ShareKnowledge (KnowledgeBatch) returns (Acknowledgement);
  rpc NegotiateConsensus (ConsensusProposals) returns (ConsensusResult);
}

message TaskRequest {
  string task_id = 1;
  string coordinator_id = 2;
  string payload = 3;
  AgentType target_agent_type = 4;
}

message TaskResponse {
  string task_id = 1;
  string agent_id = 2;
  string result = 3;
  bool success = 4;
}

message KnowledgeBatch {
  string peer_id = 1;
  map<string, string> entries = 2;
  int64 timestamp = 3;
}

message Acknowledgement {
  bool received = 1;
}

message ConsensusProposals {
  string task_id = 1;
  repeated string options = 2;
}

message ConsensusResult {
  string task_id = 1;
  string winning_option = 2;
  float confidence = 3;
}

enum AgentType {
  COORDINATOR = 0;
  RESEARCHER = 1;
  SECURITY = 2;
  WORKER = 3;
}
